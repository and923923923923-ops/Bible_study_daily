<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>立體雙語聖經 · 中英對照 · 筆記 · AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e2d4c0;  /* 杏色底 */
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans TC', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            padding: 16px;
            color: #3e2a1f;
        }

        /* 主容器 立體感 */
        .app-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fffaf2;
            border-radius: 40px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,250,230,0.9);
            overflow: hidden;
        }

        /* 標題區 */
        .header {
            background: linear-gradient(145deg, #dbbd92, #c4a16a);
            padding: 1.4rem 1.5rem;
            color: #2d241a;
            text-shadow: 0 1px 0 #f7e9d4;
            box-shadow: inset 0 -1px 0 rgba(0,0,0,0.08), 0 6px 14px rgba(0,0,0,0.1);
        }
        .header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header h1 small {
            font-size: 0.65rem;
            background: #2d241acc;
            padding: 4px 12px;
            border-radius: 40px;
            color: #fef0df;
            text-shadow: none;
        }
        .header p {
            font-size: 0.8rem;
            margin-top: 6px;
            opacity: 0.9;
        }

        /* 卡片區塊 微立體 */
        .card {
            background: #fff7ed;
            margin: 16px 18px;
            border-radius: 32px;
            padding: 1rem 1.3rem;
            box-shadow: 8px 8px 18px rgba(0, 0, 0, 0.05), -4px -4px 12px #fffcf5, inset 0 1px 0 white;
            transition: all 0.2s;
        }

        .control-group {
            margin-bottom: 1rem;
        }
        label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #8b6b42;
            letter-spacing: 0.5px;
        }
        select, input, button, textarea {
            width: 100%;
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid #eddbbc;
            background: #ffffff;
            font-size: 0.9rem;
            font-family: inherit;
            transition: 0.2s;
            outline: none;
        }
        select:focus, input:focus, textarea:focus {
            border-color: #bb8a5c;
            box-shadow: 0 0 0 3px rgba(187,138,92,0.2);
        }
        button {
            background: #ecdbba;
            border: none;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 0 #b2916a;
            transition: 0.07s linear;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b2916a;
        }
        button.primary {
            background: #cbaa7a;
            color: #2a241e;
            box-shadow: 0 3px 0 #8f6e48;
        }

        /* 經文卡片 */
        .verse-card {
            background: #fffaf0;
            border-left: 6px solid #e2bc7c;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            border-radius: 24px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .verse-ref {
            font-weight: 800;
            color: #ac7c42;
            font-size: 0.75rem;
            margin-bottom: 5px;
        }
        .verse-text {
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .english-text {
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px dashed #eddbbc;
            font-size: 0.85rem;
            color: #5e4b32;
        }
        .chapter-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0.2rem 0 1rem;
            color: #9b6e3e;
            border-left: 5px solid #e7bc7e;
            padding-left: 16px;
        }
        .loading, .error-msg {
            background: #fff0e0;
            padding: 12px;
            border-radius: 28px;
            text-align: center;
            font-size: 0.85rem;
        }
        .error-msg {
            background: #ffe0e0;
            color: #b00020;
        }
        .api-status {
            font-size: 0.7rem;
            margin-top: 6px;
            color: #a07342;
        }
        /* 筆記 */
        .note-item {
            background: #fff2e2;
            padding: 8px 12px;
            border-radius: 40px;
            margin: 6px 0;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-note {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #b56a3c;
            box-shadow: none;
            width: auto;
            padding: 0 8px;
        }
        hr {
            margin: 12px 0;
            border: none;
            height: 1px;
            background: #eeddbf;
        }
        footer {
            text-align: center;
            font-size: 0.65rem;
            padding: 1rem;
            color: #9c855f;
            background: #f9efdf;
        }

        @media (max-width: 600px) {
            body { padding: 8px; }
            .card { margin: 12px 14px; padding: 0.8rem 1rem; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>📖 立體雙語聖經 <small>和合本 + 英文對照</small></h1>
        <p>讀經・筆記・AI 問答 (DeepSeek)</p>
    </div>

    <!-- 主要控制區 -->
    <div class="card">
        <div id="bibleStatus" class="loading">⏳ 載入中文聖經 (bibleText.js)...</div>
        <div class="control-group">
            <label>📜 中文書卷</label>
            <select id="bookSelect"></select>
        </div>
        <div class="control-group">
            <label>📖 章節</label>
            <select id="chapterSelect"></select>
            <button id="loadChapterBtn" class="primary" style="margin-top: 8px;">📄 讀取章節</button>
        </div>
        <div class="control-group">
            <label>🔍 搜尋中文經文</label>
            <input type="text" id="searchInput" placeholder="例如：愛、信心、恩典">
            <button id="searchBtn">🔎 搜尋</button>
        </div>
        <div class="control-group">
            <label>✨ 隨機金句</label>
            <button id="randomBtn">🎲 隨機一節經文</button>
        </div>
    </div>

    <!-- 英文設定區塊 (免API Key) -->
    <div class="card">
        <div class="control-group">
            <label>🌐 英文聖經 (免費)</label>
            <select id="englishVersionSelect">
                <option value="web" selected>World English Bible (WEB) – 推薦</option>
                <option value="kjv">King James Version (KJV)</option>
            </select>
        </div>
        <div class="control-group">
            <label>🔘 顯示模式</label>
            <select id="displayMode">
                <option value="both" selected>中＋英文對照</option>
                <option value="chinese">僅中文</option>
                <option value="english">僅英文</option>
            </select>
        </div>
        <div id="englishStatus" class="api-status"></div>
    </div>

    <!-- 經文顯示區域 -->
    <div class="card" id="displayArea">
        <div class="chapter-title" id="chapterTitle">📖 請選擇書卷與章節</div>
        <div id="versesContainer"></div>
    </div>

    <!-- 筆記區 -->
    <div class="card">
        <label>📝 筆記 (目前章節) 自動儲存</label>
        <textarea id="noteText" rows="2" placeholder="寫下讀經心得..."></textarea>
        <button id="saveNoteBtn">💾 儲存筆記</button>
        <div id="notesList"></div>
    </div>

    <!-- AI 區 (DeepSeek 可選) -->
    <div class="card">
        <div class="control-group">
            <label>🤖 DeepSeek API Key (選填)</label>
            <input type="password" id="deepseekApiKey" placeholder="sk-... 若不填則無法使用AI">
            <button id="saveDeepSeekKeyBtn">💾 儲存 Key</button>
            <div class="api-status" id="deepseekStatus"></div>
        </div>
        <div class="control-group">
            <input type="text" id="aiQuestion" placeholder="例如：什麼是愛？如何禱告？">
            <button id="askAiBtn" class="primary">💬 詢問 AI</button>
        </div>
        <div id="aiAnswer" style="background:#fff5e6; border-radius:28px; padding:12px; margin-top:12px; display:none; font-size:0.85rem;"></div>
    </div>
    <footer>中文聖經：和合本 (bibleText.js)｜英文：bible-api.com 免費服務｜筆記與設定儲存於瀏覽器</footer>
</div>

<script>
    // ======================== 全域變數 ========================
    let bibleArray = [];            // 原始中文經文字串
    let parsedVerses = [];         // 中文經文物件 {book, chapter, verse, text}
    let booksMap = new Map();       // 縮寫 -> 中文全名
    let bookChaptersMap = new Map(); // 縮寫 -> 章節陣列
    let currentBook = '', currentChapter = 1;

    // 設定儲存
    let deepseekApiKey = localStorage.getItem('deepseek_api_key') || '';
    let displayMode = localStorage.getItem('display_mode') || 'both';
    let englishVersion = localStorage.getItem('english_version') || 'web';

    // ---------- 聖經正典順序 (舊約+新約) ----------
    const canonicalOrder = [
        '創','出','利','民','申','書','士','得','撒上','撒下','王上','王下','代上','代下','拉','尼','斯',
        '伯','詩','箴','傳','歌','賽','耶','哀','結','但',
        '何','珥','摩','俄','拿','彌','鴻','哈','番','該','亞','瑪',
        '太','可','路','約','徒','羅','林前','林後','加','弗','腓','西','帖前','帖後','提前','提後','多','門',
        '來','雅','彼前','彼後','約一','約二','約三','猶','啟'
    ];

    const fullNameMap = {
        '創':'創世記','出':'出埃及記','利':'利未記','民':'民數記','申':'申命記',
        '書':'約書亞記','士':'士師記','得':'路得記','撒上':'撒母耳記上','撒下':'撒母耳記下',
        '王上':'列王紀上','王下':'列王紀下','代上':'歷代志上','代下':'歷代志下',
        '拉':'以斯拉記','尼':'尼希米記','斯':'以斯帖記','伯':'約伯記','詩':'詩篇',
        '箴':'箴言','傳':'傳道書','歌':'雅歌','賽':'以賽亞書','耶':'耶利米書',
        '哀':'耶利米哀歌','結':'以西結書','但':'但以理書','何':'何西阿書','珥':'約珥書',
        '摩':'阿摩司書','俄':'俄巴底亞書','拿':'約拿書','彌':'彌迦書','鴻':'那鴻書',
        '哈':'哈巴谷書','番':'西番雅書','該':'哈該書','亞':'撒迦利亞書','瑪':'瑪拉基書',
        '太':'馬太福音','可':'馬可福音','路':'路加福音','約':'約翰福音','徒':'使徒行傳',
        '羅':'羅馬書','林前':'哥林多前書','林後':'哥林多後書','加':'加拉太書','弗':'以弗所書',
        '腓':'腓立比書','西':'歌羅西書','帖前':'帖撒羅尼迦前書','帖後':'帖撒羅尼迦後書',
        '提前':'提摩太前書','提後':'提摩太後書','多':'提多書','門':'腓利門書','來':'希伯來書',
        '雅':'雅各書','彼前':'彼得前書','彼後':'彼得後書','約一':'約翰一書','約二':'約翰二書',
        '約三':'約翰三書','猶':'猶大書','啟':'啟示錄'
    };

    // ---------- 解析中文經文 (與 bibleText.js 格式相容) ----------
    function parseLine(line) {
        let bookAbbr = '';
        let rest = line;
        const twoCharBooks = ['撒上','撒下','王上','王下','代上','代下','林前','林後','帖前','帖後','提前','提後','約一','約二','約三','彼前','彼後'];
        for (let two of twoCharBooks) {
            if (line.startsWith(two)) {
                bookAbbr = two;
                rest = line.slice(two.length);
                break;
            }
        }
        if (!bookAbbr) {
            const match = line.match(/^([\u4e00-\u9fa5]+)(\d+):(\d+)\s+(.*)/);
            if (!match) return null;
            bookAbbr = match[1];
            rest = line;
        }
        const regex = new RegExp(`^${bookAbbr}(\\d+):(\\d+)\\s+(.*)`);
        const match = rest.match(regex);
        if (!match) return null;
        return {
            book: bookAbbr,
            chapter: parseInt(match[1]),
            verse: parseInt(match[2]),
            text: match[3]
        };
    }

    function buildChineseIndex() {
        parsedVerses = [];
        booksMap.clear();
        bookChaptersMap.clear();
        for (let line of bibleArray) {
            const v = parseLine(line);
            if (!v) continue;
            parsedVerses.push(v);
            if (!booksMap.has(v.book)) booksMap.set(v.book, fullNameMap[v.book] || v.book);
            if (!bookChaptersMap.has(v.book)) bookChaptersMap.set(v.book, new Set());
            bookChaptersMap.get(v.book).add(v.chapter);
        }
        for (let [book, set] of bookChaptersMap.entries()) {
            bookChaptersMap.set(book, Array.from(set).sort((a,b)=>a-b));
        }
        updateBookSelect();
        document.getElementById('bibleStatus').innerHTML = '✅ 中文聖經載入成功，共 ' + parsedVerses.length + ' 節';
        document.getElementById('bibleStatus').className = 'api-status';
    }

    function updateBookSelect() {
        const select = document.getElementById('bookSelect');
        if (!select) return;
        const available = new Set(booksMap.keys());
        const ordered = canonicalOrder.filter(b => available.has(b));
        select.innerHTML = '<option value="">-- 請選擇書卷 --</option>';
        for (let b of ordered) {
            select.innerHTML += `<option value="${b}">${b} ${booksMap.get(b)}</option>`;
        }
        if (ordered.length) select.value = ordered[0];
        updateChapterSelect();
    }

    function updateChapterSelect() {
        const book = document.getElementById('bookSelect').value;
        const chapSelect = document.getElementById('chapterSelect');
        if (!book || !bookChaptersMap.has(book)) {
            chapSelect.innerHTML = '<option>無章節</option>';
            return;
        }
        const chapters = bookChaptersMap.get(book);
        chapSelect.innerHTML = '';
        for (let ch of chapters) {
            chapSelect.innerHTML += `<option value="${ch}">第 ${ch} 章</option>`;
        }
        if (chapters.length) chapSelect.value = chapters[0];
    }

    function getChineseChapter(book, chapter) {
        return parsedVerses.filter(v => v.book === book && v.chapter === chapter).sort((a,b)=>a.verse-b.verse);
    }

    // ---------- 英文聖經 (免費 bible-api.com) ----------
    function chineseToEnglishBook(chineseFullName) {
        const map = {
            '創世記':'genesis','出埃及記':'exodus','利未記':'leviticus','民數記':'numbers','申命記':'deuteronomy',
            '約書亞記':'joshua','士師記':'judges','路得記':'ruth','撒母耳記上':'1samuel','撒母耳記下':'2samuel',
            '列王紀上':'1kings','列王紀下':'2kings','歷代志上':'1chronicles','歷代志下':'2chronicles','以斯拉記':'ezra',
            '尼希米記':'nehemiah','以斯帖記':'esther','約伯記':'job','詩篇':'psalms','箴言':'proverbs',
            '傳道書':'ecclesiastes','雅歌':'songofsolomon','以賽亞書':'isaiah','耶利米書':'jeremiah','耶利米哀歌':'lamentations',
            '以西結書':'ezekiel','但以理書':'daniel','何西阿書':'hosea','約珥書':'joel','阿摩司書':'amos',
            '俄巴底亞書':'obadiah','約拿書':'jonah','彌迦書':'micah','那鴻書':'nahum','哈巴谷書':'habakkuk',
            '西番雅書':'zephaniah','哈該書':'haggai','撒迦利亞書':'zechariah','瑪拉基書':'malachi',
            '馬太福音':'matthew','馬可福音':'mark','路加福音':'luke','約翰福音':'john','使徒行傳':'acts',
            '羅馬書':'romans','哥林多前書':'1corinthians','哥林多後書':'2corinthians','加拉太書':'galatians','以弗所書':'ephesians',
            '腓立比書':'philippians','歌羅西書':'colossians','帖撒羅尼迦前書':'1thessalonians','帖撒羅尼迦後書':'2thessalonians',
            '提摩太前書':'1timothy','提摩太後書':'2timothy','提多書':'titus','腓利門書':'philemon','希伯來書':'hebrews',
            '雅各書':'james','彼得前書':'1peter','彼得後書':'2peter','約翰一書':'1john','約翰二書':'2john',
            '約翰三書':'3john','猶大書':'jude','啟示錄':'revelation'
        };
        return map[chineseFullName];
    }

    async function fetchEnglishVerses(bookAbbr, chapter) {
        const chineseFull = booksMap.get(bookAbbr);
        const engBook = chineseToEnglishBook(chineseFull);
        if (!engBook) return { error: `找不到英文書名: ${chineseFull}` };
        const version = document.getElementById('englishVersionSelect').value;
        const url = `https://bible-api.com/${engBook}%20${chapter}?translation=${version}`;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const verses = {};
            if (data.verses) {
                data.verses.forEach(v => { verses[v.verse] = v.text; });
            }
            return verses;
        } catch (err) {
            return { error: err.message };
        }
    }

    // 核心顯示函數 (中英文)
    async function displayChapter(book, chapter) {
        currentBook = book;
        currentChapter = chapter;
        const chineseVerses = getChineseChapter(book, chapter);
        const title = `${booksMap.get(book)} 第 ${chapter} 章`;
        document.getElementById('chapterTitle').innerHTML = `📖 ${title}`;

        const mode = document.getElementById('displayMode').value;
        if (mode === 'chinese') {
            let html = '';
            for (let v of chineseVerses) {
                html += `<div class="verse-card">
                            <div class="verse-ref">${v.book}${v.chapter}:${v.verse}</div>
                            <div class="verse-text">${v.text}</div>
                        </div>`;
            }
            document.getElementById('versesContainer').innerHTML = html;
            loadNoteForChapter(book, chapter);
            return;
        }

        // 需要英文時，顯示 loading
        document.getElementById('versesContainer').innerHTML = '<div class="loading">⏳ 載入英文經文中...</div>';
        let engData = await fetchEnglishVerses(book, chapter);

        let html = '';
        for (let v of chineseVerses) {
            let engText = '';
            if (engData && !engData.error && engData[v.verse]) engText = engData[v.verse];
            else if (engData && engData.error) engText = `[錯誤: ${engData.error}]`;

            if (mode === 'both') {
                html += `<div class="verse-card">
                            <div class="verse-ref">${v.book}${v.chapter}:${v.verse}</div>
                            <div class="verse-text">${v.text}</div>
                            <div class="english-text">📘 ${engText || '(無英文)'}</div>
                        </div>`;
            } else if (mode === 'english') {
                if (engText && !engData.error) {
                    html += `<div class="verse-card">
                                <div class="verse-ref">${v.book}${v.chapter}:${v.verse}</div>
                                <div class="verse-text">${engText}</div>
                            </div>`;
                }
            }
        }
        if (mode === 'english' && engData && engData.error) {
            html = `<div class="error-msg">⚠️ 英文載入失敗：${engData.error}<br>請確認網路連線或稍後重試</div>`;
        }
        document.getElementById('versesContainer').innerHTML = html;
        loadNoteForChapter(book, chapter);
    }

    // ---------- 隨機金句 ----------
    function randomVerse() {
        if (!parsedVerses.length) return;
        const rand = Math.floor(Math.random() * parsedVerses.length);
        const v = parsedVerses[rand];
        displayChapter(v.book, v.chapter);
        setTimeout(() => {
            const refs = document.querySelectorAll('.verse-ref');
            for (let el of refs) {
                if (el.innerText.includes(`${v.book}${v.chapter}:${v.verse}`)) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.parentElement.style.backgroundColor = '#fce7cf';
                    setTimeout(() => { if(el.parentElement) el.parentElement.style.backgroundColor = ''; }, 1000);
                    break;
                }
            }
        }, 100);
    }

    // ---------- 搜尋中文 ----------
    function searchVerses(keyword) {
        const lower = keyword.toLowerCase();
        return parsedVerses.filter(v => v.text.toLowerCase().includes(lower));
    }

    function showSearchResults(keyword) {
        const results = searchVerses(keyword);
        if (!results.length) {
            document.getElementById('versesContainer').innerHTML = `<div class="error-msg">🔍 沒有找到「${escapeHtml(keyword)}」</div>`;
            document.getElementById('chapterTitle').innerHTML = `🔎 搜尋結果`;
            return;
        }
        document.getElementById('chapterTitle').innerHTML = `🔎 「${keyword}」 共 ${results.length} 節 (僅中文)`;
        let html = '';
        for (let v of results.slice(0, 50)) {
            html += `<div class="verse-card" data-book="${v.book}" data-chapter="${v.chapter}" style="cursor:pointer;">
                        <div class="verse-ref">${v.book}${v.chapter}:${v.verse}</div>
                        <div class="verse-text">${v.text}</div>
                    </div>`;
        }
        document.getElementById('versesContainer').innerHTML = html;
        // 點擊搜尋結果跳轉
        document.querySelectorAll('#versesContainer .verse-card[data-book]').forEach(card => {
            card.addEventListener('click', () => {
                const b = card.getAttribute('data-book');
                const c = parseInt(card.getAttribute('data-chapter'));
                if (b && c) {
                    document.getElementById('bookSelect').value = b;
                    updateChapterSelect();
                    setTimeout(() => {
                        document.getElementById('chapterSelect').value = c;
                        displayChapter(b, c);
                    }, 20);
                }
            });
        });
    }

    // ---------- 筆記功能 (依章節儲存) ----------
    function loadNoteForChapter(book, chapter) {
        const key = `note_${book}_${chapter}`;
        const saved = localStorage.getItem(key);
        document.getElementById('noteText').value = saved || '';
        showNotesList(book, chapter);
    }

    function saveCurrentNote() {
        if (!currentBook || !currentChapter) return;
        const note = document.getElementById('noteText').value;
        localStorage.setItem(`note_${currentBook}_${currentChapter}`, note);
        showNotesList(currentBook, currentChapter);
    }

    function showNotesList(book, chapter) {
        const key = `note_${book}_${chapter}`;
        const note = localStorage.getItem(key) || '';
        const container = document.getElementById('notesList');
        if (!note.trim()) {
            container.innerHTML = '<div class="note-item">尚無筆記</div>';
            return;
        }
        container.innerHTML = `<div class="note-item">
            <span>📌 ${book}${chapter} 章筆記： ${note.substring(0, 70)}${note.length>70?'…':''}</span>
            <button class="delete-note" data-key="${key}">🗑️</button>
        </div>`;
        const delBtn = container.querySelector('.delete-note');
        if (delBtn) delBtn.addEventListener('click', () => {
            localStorage.removeItem(key);
            loadNoteForChapter(book, chapter);
        });
    }

    // ---------- DeepSeek AI 功能 ----------
    async function callDeepSeek(question) {
        if (!deepseekApiKey) return '❗ 請先在上方輸入 DeepSeek API Key 並儲存。';
        const answerDiv = document.getElementById('aiAnswer');
        answerDiv.style.display = 'block';
        answerDiv.innerHTML = '🤔 思考中，呼叫 DeepSeek ...';
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${deepseekApiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: '你是一位聖經研讀助手，請根據聖經真理回答問題，並適當引用經文。' },
                        { role: 'user', content: question }
                    ],
                    temperature: 0.7,
                    max_tokens: 800
                })
            });
            if (!response.ok) {
                const err = await response.text();
                return `❌ API 錯誤 (${response.status})：${err.substring(0, 200)}`;
            }
            const data = await response.json();
            return data.choices[0].message.content;
        } catch (e) {
            return `❌ 連線失敗：${e.message}`;
        }
    }

    async function askAI() {
        const question = document.getElementById('aiQuestion').value.trim();
        if (!question) { alert('請輸入問題'); return; }
        const answer = await callDeepSeek(question);
        const answerDiv = document.getElementById('aiAnswer');
        answerDiv.style.display = 'block';
        answerDiv.innerHTML = `<strong>🤖 DeepSeek 回答：</strong><br>${answer.replace(/\n/g, '<br>')}`;
    }

    // ---------- 儲存設定與偏好 ----------
    function saveDeepSeekKey() {
        const key = document.getElementById('deepseekApiKey').value.trim();
        if (key) {
            localStorage.setItem('deepseek_api_key', key);
            deepseekApiKey = key;
            document.getElementById('deepseekStatus').innerHTML = '✅ Key 已儲存';
        } else {
            localStorage.removeItem('deepseek_api_key');
            deepseekApiKey = '';
            document.getElementById('deepseekStatus').innerHTML = '⚠️ Key 已清除';
        }
    }

    function saveDisplayMode() {
        const mode = document.getElementById('displayMode').value;
        localStorage.setItem('display_mode', mode);
        displayMode = mode;
        if (currentBook && currentChapter) displayChapter(currentBook, currentChapter);
    }

    function saveEnglishVersion() {
        const ver = document.getElementById('englishVersionSelect').value;
        localStorage.setItem('english_version', ver);
        englishVersion = ver;
        if (currentBook && currentChapter) displayChapter(currentBook, currentChapter);
    }

    // ---------- 載入 bibleText.js 並初始化 ----------
    function loadBibleScript() {
        return new Promise((resolve, reject) => {
            if (typeof bibleText !== 'undefined' && Array.isArray(bibleText)) {
                bibleArray = bibleText;
                buildChineseIndex();
                resolve(true);
                return;
            }
            const script = document.createElement('script');
            script.src = './bibleText.js';
            script.onload = () => {
                if (typeof bibleText !== 'undefined') {
                    bibleArray = bibleText;
                    buildChineseIndex();
                    resolve(true);
                } else {
                    reject('bibleText 全域變數不存在');
                }
            };
            script.onerror = () => reject('無法載入 bibleText.js，請確認檔案在相同目錄');
            document.head.appendChild(script);
        });
    }

    function initUI() {
        document.getElementById('displayMode').value = displayMode;
        document.getElementById('englishVersionSelect').value = englishVersion;
        document.getElementById('deepseekApiKey').value = deepseekApiKey;
        if (deepseekApiKey) document.getElementById('deepseekStatus').innerHTML = '✅ Key 已載入';
        else document.getElementById('deepseekStatus').innerHTML = '⚠️ 未設定 Key';
    }

    function bindEvents() {
        document.getElementById('bookSelect').addEventListener('change', () => updateChapterSelect());
        document.getElementById('loadChapterBtn').addEventListener('click', () => {
            const book = document.getElementById('bookSelect').value;
            const chap = parseInt(document.getElementById('chapterSelect').value);
            if (book && chap) displayChapter(book, chap);
        });
        document.getElementById('searchBtn').addEventListener('click', () => {
            const kw = document.getElementById('searchInput').value.trim();
            if (kw) showSearchResults(kw);
            else alert('請輸入關鍵字');
        });
        document.getElementById('randomBtn').addEventListener('click', randomVerse);
        document.getElementById('saveNoteBtn').addEventListener('click', saveCurrentNote);
        document.getElementById('saveDeepSeekKeyBtn').addEventListener('click', saveDeepSeekKey);
        document.getElementById('askAiBtn').addEventListener('click', askAI);
        document.getElementById('displayMode').addEventListener('change', saveDisplayMode);
        document.getElementById('englishVersionSelect').addEventListener('change', saveEnglishVersion);
    }

    (async function() {
        initUI();
        bindEvents();
        try {
            await loadBibleScript();
        } catch (err) {
            document.getElementById('bibleStatus').innerHTML = `❌ ${err}，請確認 bibleText.js 存在`;
            document.getElementById('bibleStatus').className = 'error-msg';
            // 提供最小備用資料讓介面可操作
            bibleArray = ['創1:1 起初神創造天地。'];
            buildChineseIndex();
        }
        if (Array.from(booksMap.keys()).length) {
            const firstBook = canonicalOrder.find(b => booksMap.has(b)) || Array.from(booksMap.keys())[0];
            const firstChap = bookChaptersMap.get(firstBook)?.[0] || 1;
            displayChapter(firstBook, firstChap);
        }
    })();

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
